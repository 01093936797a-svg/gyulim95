<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>내 투자 포트폴리오</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede8;
      --text: #1a1a18; --text2: #6b6b67;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --green: #1D9E75; --green-bg: #E1F5EE; --green-dark: #085041;
      --red: #E24B4A; --red-bg: #FCEBEB; --red-dark: #791F1F;
      --blue: #378ADD; --blue-bg: #E6F1FB; --blue-dark: #0C447C;
      --amber: #BA7517; --amber-bg: #FAEEDA; --amber-dark: #633806;
      --purple: #7F77DD; --gray: #888780;
      --radius: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #323230;
        --text: #f0ede8; --text2: #9a9a96;
        --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
        --green-bg: #04342C; --green-dark: #9FE1CB;
        --red-bg: #501313; --red-dark: #F09595;
        --blue-bg: #042C53; --blue-dark: #85B7EB;
        --amber-bg: #412402; --amber-dark: #FAC775;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 960px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 0.25rem; }
    .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }
    h2 { font-size: 14px; font-weight: 500; color: var(--text2); margin-bottom: 1rem; }

    .tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 0.5px solid var(--border); }
    .tab { padding: 8px 16px; font-size: 14px; cursor: pointer; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s; }
    .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
    .metric { background: var(--bg2); border-radius: var(--radius); padding: 1rem; }
    .metric-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
    .metric-value { font-size: 20px; font-weight: 500; }
    .up { color: var(--green); } .down { color: var(--red); }
    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.5rem; }

    .add-form { display: grid; grid-template-columns: 1.4fr 1fr 1.1fr 0.7fr 0.7fr 0.7fr auto; gap: 8px; align-items: end; margin-bottom: 1.5rem; }
    .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
    .field input, .field select { width: 100%; padding: 7px 10px; font-size: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); outline: none; }
    .field input:focus, .field select:focus { border-color: var(--blue); }
    .btn { padding: 7px 14px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); cursor: pointer; font-size: 13px; white-space: nowrap; }
    .btn:hover { background: var(--bg2); }
    .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .btn-primary:hover { opacity: 0.85; }
    .btn-del { background: none; border: none; cursor: pointer; color: var(--text2); font-size: 14px; padding: 0 4px; }
    .btn-del:hover { color: var(--red); }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; }

    .donut-wrap { display: flex; align-items: center; gap: 16px; }
    .legend { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .leg-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .leg-pct { margin-left: auto; color: var(--text2); }

    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; }
    .bar-label { width: 56px; color: var(--text2); text-align: right; flex-shrink: 0; font-size: 12px; }
    .bar-track { flex: 1; height: 8px; background: var(--bg2); border-radius: 4px; overflow: visible; position: relative; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width .4s; }
    .bar-target { position: absolute; top: -3px; height: 14px; width: 2px; background: var(--text); opacity: 0.45; border-radius: 1px; }
    .bar-val { width: 44px; text-align: right; flex-shrink: 0; font-size: 12px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { text-align: left; font-weight: 500; color: var(--text2); padding: 6px 8px; border-bottom: 0.5px solid var(--border); }
    tbody td { padding: 9px 8px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: var(--radius); font-size: 12px; }
    .badge.up   { background: var(--green-bg); color: var(--green-dark); }
    .badge.dn   { background: var(--red-bg);   color: var(--red-dark); }
    .badge.warn { background: var(--amber-bg); color: var(--amber-dark); }
    .badge.info { background: var(--blue-bg);  color: var(--blue-dark); }

    .alerts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
    .alert { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-radius: var(--radius); font-size: 13px; line-height: 1.5; }
    .alert.rebal { background: var(--blue-bg);  color: var(--blue-dark);  border: 0.5px solid var(--blue); }
    .alert.stop  { background: var(--red-bg);   color: var(--red-dark);   border: 0.5px solid var(--red); }
    .alert.buy   { background: var(--green-bg); color: var(--green-dark); border: 0.5px solid var(--green); }
    .alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .alert-body strong { display: block; font-weight: 500; margin-bottom: 2px; }

    .target-form { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1rem; }
    .chart-wrap { position: relative; height: 160px; margin-top: 8px; }
    .snap-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .snap-row input { flex: 1; padding: 7px 10px; font-size: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); outline: none; }

    @media (max-width: 700px) {
      .metrics { grid-template-columns: 1fr 1fr; }
      .two-col { grid-template-columns: 1fr; }
      .add-form { grid-template-columns: 1fr 1fr; }
      .add-form .btn-primary { grid-column: 1 / -1; }
      .target-form { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>내 투자 포트폴리오</h1>
  <p class="subtitle" id="last-updated"></p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">개요</button>
    <button class="tab" onclick="switchTab('rebal')">리밸런싱</button>
    <button class="tab" onclick="switchTab('alerts')">알림 <span id="alert-badge"></span></button>
    <button class="tab" onclick="switchTab('history')">월별 히스토리</button>
  </div>

  <!-- 개요 -->
  <div id="tab-overview" class="tab-panel active">
    <div class="metrics" id="metrics"></div>
    <div class="card">
      <h2>종목 추가</h2>
      <div class="add-form">
        <div class="field"><label>종목명</label><input id="inp-name" placeholder="예: 삼성전자"/></div>
        <div class="field"><label>자산군</label>
          <select id="inp-cat">
            <option>국내주식</option><option>해외주식</option><option>ETF</option>
            <option>채권</option><option>암호화폐</option><option>현금/예금</option>
          </select>
        </div>
        <div class="field"><label>평가금액 (원)</label><input id="inp-val" type="number" placeholder="1000000"/></div>
        <div class="field"><label>수익률 (%)</label><input id="inp-ret" type="number" step="0.1" placeholder="5.2"/></div>
        <div class="field"><label>손절선 (%)</label><input id="inp-stop" type="number" step="0.1" placeholder="-15"/></div>
        <div class="field"><label>추매선 (%)</label><input id="inp-buy" type="number" step="0.1" placeholder="-8"/></div>
        <button class="btn btn-primary" onclick="addItem()">추가 +</button>
      </div>
    </div>
    <div class="two-col">
      <div class="card" style="margin-bottom:0">
        <h2>자산 배분</h2>
        <div class="donut-wrap">
          <svg width="110" height="110" viewBox="0 0 100 100" id="donut"></svg>
          <div class="legend" id="legend"></div>
        </div>
      </div>
      <div class="card" style="margin-bottom:0">
        <h2>자산군별 비중 <span style="font-size:11px;font-weight:400">▏= 목표</span></h2>
        <div id="bars"></div>
      </div>
    </div>
    <div style="margin-bottom:1.5rem"></div>
    <div class="card">
      <h2>보유 종목</h2>
      <table>
        <thead><tr><th>종목명</th><th>자산군</th><th>평가금액</th><th>비중</th><th>수익률</th><th>손절선</th><th>추매선</th><th></th></tr></thead>
        <tbody id="tbl"></tbody>
      </table>
    </div>
  </div>

  <!-- 리밸런싱 -->
  <div id="tab-rebal" class="tab-panel">
    <div class="card">
      <h2>목표 비중 설정 (%)</h2>
      <div class="target-form" id="target-form"></div>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="target-sum-msg" style="font-size:13px"></span>
        <button class="btn btn-primary" style="margin-left:auto" onclick="saveTargets()">저장</button>
      </div>
    </div>
    <div class="card">
      <h2>리밸런싱 내역</h2>
      <table>
        <thead><tr><th>자산군</th><th>현재 비중</th><th>목표 비중</th><th>차이</th><th>조정 금액</th></tr></thead>
        <tbody id="rebal-tbl"></tbody>
      </table>
    </div>
  </div>

  <!-- 알림 -->
  <div id="tab-alerts" class="tab-panel">
    <div id="alerts-wrap"></div>
    <p id="no-alerts" style="font-size:14px;color:var(--text2);text-align:center;padding:3rem 0;display:none">현재 발동된 알림이 없습니다 👍</p>
  </div>

  <!-- 히스토리 -->
  <div id="tab-history" class="tab-panel">
    <div class="card">
      <h2>이번 달 스냅샷 저장</h2>
      <div class="snap-row">
        <input id="snap-memo" placeholder="메모 (예: 2025년 4월말 기준)"/>
        <button class="btn btn-primary" onclick="saveSnapshot()">현재 포트폴리오 저장</button>
      </div>
      <p style="font-size:12px;color:var(--text2)">저장하면 오늘 날짜로 총자산과 수익률이 기록됩니다.</p>
    </div>
    <div class="card">
      <h2>총자산 추이</h2>
      <div class="chart-wrap"><canvas id="hist-chart"></canvas></div>
    </div>
    <div class="card">
      <h2>스냅샷 기록</h2>
      <table>
        <thead><tr><th>날짜</th><th>총자산</th><th>수익률</th><th>메모</th><th></th></tr></thead>
        <tbody id="snap-tbl"></tbody>
      </table>
      <p id="no-snaps" style="font-size:13px;color:var(--text2);text-align:center;padding:2rem;display:none">아직 저장된 스냅샷이 없습니다</p>
    </div>
  </div>

  <p style="text-align:center;font-size:12px;color:var(--text2);margin-top:1rem">데이터는 브라우저에 저장됩니다 (localStorage)</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script>
const CAT_COLORS = {'국내주식':'#1D9E75','해외주식':'#378ADD','ETF':'#BA7517','채권':'#D4537E','암호화폐':'#7F77DD','현금/예금':'#888780'};
const CATS = Object.keys(CAT_COLORS);

function load(k, d) { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } }
function save(k, v) { localStorage.setItem(k, JSON.stringify(v)); }
function fmt(n) { return Math.round(n).toLocaleString('ko-KR'); }
function fmtPct(n) { return (n >= 0 ? '+' : '') + n.toFixed(1) + '%'; }
function isDark() { return matchMedia('(prefers-color-scheme: dark)').matches; }

let items     = load('pf_items', [{name:'삼성전자',cat:'국내주식',val:3500000,ret:8.2,stop:-15,buy:-8},{name:'S&P500 ETF',cat:'ETF',val:2800000,ret:12.5,stop:-20,buy:-10},{name:'미국국채 ETF',cat:'채권',val:1500000,ret:2.1,stop:null,buy:null},{name:'Apple',cat:'해외주식',val:2000000,ret:-3.4,stop:-15,buy:-8},{name:'현금',cat:'현금/예금',val:800000,ret:3.5,stop:null,buy:null}]);
let targets   = load('pf_targets', {'국내주식':30,'해외주식':25,'ETF':20,'채권':15,'암호화폐':5,'현금/예금':5});
let snapshots = load('pf_snaps', []);
let histChart = null;

function switchTab(id) {
  const ids = ['overview','rebal','alerts','history'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ids[i] === id));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if (id === 'rebal')   renderRebal();
  if (id === 'alerts')  renderAlerts();
  if (id === 'history') renderHistory();
}

function getAlerts() {
  const total = items.reduce((s,i)=>s+i.val,0);
  const cats  = {}; items.forEach(it => { cats[it.cat]=(cats[it.cat]||0)+it.val; });
  const res   = [];
  CATS.forEach(cat => {
    const tgt = targets[cat]||0; if (!tgt) return;
    const cur = total > 0 ? (cats[cat]||0)/total*100 : 0;
    const diff = cur - tgt;
    if (Math.abs(diff) >= 5) res.push({type:'rebal',cat,cur,tgt,diff});
  });
  items.forEach(it => {
    if (it.stop != null && it.ret <= it.stop) res.push({type:'stop',name:it.name,ret:it.ret,line:it.stop});
    else if (it.buy != null && it.ret <= it.buy) res.push({type:'buy',name:it.name,ret:it.ret,line:it.buy});
  });
  return res;
}

function render() {
  const total  = items.reduce((s,i)=>s+i.val,0);
  const gain   = items.reduce((s,i)=>s+i.val*i.ret/100,0);
  const cost   = total - gain;
  const retPct = cost > 0 ? gain/cost*100 : 0;
  const alerts = getAlerts();

  document.getElementById('last-updated').textContent = '최종 업데이트: ' + new Date().toLocaleDateString('ko-KR');
  const ab = document.getElementById('alert-badge');
  ab.textContent = alerts.length ? alerts.length : '';
  ab.style.cssText = alerts.length ? 'display:inline-block;background:var(--red);color:#fff;border-radius:10px;font-size:11px;padding:1px 6px;margin-left:4px' : '';

  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">총 자산</div><div class="metric-value">₩${fmt(total)}</div></div>
    <div class="metric"><div class="metric-label">총 수익금</div><div class="metric-value ${gain>=0?'up':'down'}">${gain>=0?'+':''}₩${fmt(Math.abs(gain))}</div></div>
    <div class="metric"><div class="metric-label">수익률</div><div class="metric-value ${retPct>=0?'up':'down'}">${fmtPct(retPct)}</div></div>
    <div class="metric"><div class="metric-label">알림</div><div class="metric-value" style="color:${alerts.length?'var(--red)':'var(--text2)'}">${alerts.length}건</div></div>`;

  // Table
  const tbl = document.getElementById('tbl');
  if (!items.length) { tbl.innerHTML='<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text2)">종목을 추가해주세요</td></tr>'; }
  else tbl.innerHTML = items.map((it,i) => {
    const pct = total > 0 ? it.val/total*100 : 0;
    const c   = CAT_COLORS[it.cat]||'#888';
    const triggered_stop = it.stop!=null && it.ret<=it.stop;
    const triggered_buy  = it.buy!=null  && it.ret<=it.buy && !triggered_stop;
    const stopCell = it.stop!=null ? `<span class="badge ${triggered_stop?'dn':''}" style="${triggered_stop?'':'background:var(--bg2);color:var(--text2)'}">${it.stop}%</span>` : '<span style="color:var(--text2)">—</span>';
    const buyCell  = it.buy!=null  ? `<span class="badge ${triggered_buy?'info':''}" style="${triggered_buy?'':'background:var(--bg2);color:var(--text2)'}">${it.buy}%</span>` : '<span style="color:var(--text2)">—</span>';
    return `<tr>
      <td style="font-weight:500">${it.name}</td>
      <td><span style="background:${c}22;color:${c};padding:2px 8px;border-radius:4px;font-size:12px">${it.cat}</span></td>
      <td>₩${fmt(it.val)}</td><td>${pct.toFixed(1)}%</td>
      <td><span class="badge ${it.ret>=0?'up':'dn'}">${fmtPct(it.ret)}</span></td>
      <td>${stopCell}</td><td>${buyCell}</td>
      <td><button class="btn-del" onclick="del(${i})">✕</button></td>
    </tr>`;
  }).join('');

  // Donut
  const cats = {}; items.forEach(it => { cats[it.cat]=(cats[it.cat]||0)+it.val; });
  const entries = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const svg = document.getElementById('donut'), leg = document.getElementById('legend');
  if (!total) { svg.innerHTML=''; leg.innerHTML=''; }
  else {
    let paths='', angle=-Math.PI/2;
    const cx=50,cy=50,r=40,ir=22;
    entries.forEach(([cat,val]) => {
      const a=val/total*Math.PI*2;
      const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
      const x2=cx+r*Math.cos(angle+a),y2=cy+r*Math.sin(angle+a);
      const ix1=cx+ir*Math.cos(angle),iy1=cy+ir*Math.sin(angle);
      const ix2=cx+ir*Math.cos(angle+a),iy2=cy+ir*Math.sin(angle+a);
      paths+=`<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${a>Math.PI?1:0},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${ix2.toFixed(1)},${iy2.toFixed(1)} A${ir},${ir} 0 ${a>Math.PI?1:0},0 ${ix1.toFixed(1)},${iy1.toFixed(1)} Z" fill="${CAT_COLORS[cat]||'#888'}" opacity="0.85"/>`;
      angle+=a;
    });
    svg.innerHTML = paths;
    leg.innerHTML = entries.map(([cat,val])=>`<div class="leg-item"><span class="leg-dot" style="background:${CAT_COLORS[cat]||'#888'}"></span><span>${cat}</span><span class="leg-pct">${(val/total*100).toFixed(0)}%</span></div>`).join('');
  }

  // Bars
  document.getElementById('bars').innerHTML = entries.map(([cat,val]) => {
    const pct=total>0?val/total*100:0, tgt=targets[cat]||0;
    return `<div class="bar-row">
      <span class="bar-label">${cat.length>4?cat.slice(0,4):cat}</span>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct.toFixed(1)}%;background:${CAT_COLORS[cat]||'#888'}"></div>
        ${tgt?`<div class="bar-target" style="left:${Math.min(tgt,100)}%"></div>`:''}
      </div>
      <span class="bar-val">${pct.toFixed(1)}%</span>
    </div>`;
  }).join('');

  save('pf_items', items);
}

function addItem() {
  const name = document.getElementById('inp-name').value.trim();
  const cat  = document.getElementById('inp-cat').value;
  const val  = parseFloat(document.getElementById('inp-val').value)||0;
  const ret  = parseFloat(document.getElementById('inp-ret').value)||0;
  const sv   = document.getElementById('inp-stop').value;
  const bv   = document.getElementById('inp-buy').value;
  const stop = sv!==''?parseFloat(sv):null;
  const buy  = bv!==''?parseFloat(bv):null;
  if (!name||val<=0){alert('종목명과 평가금액을 입력해주세요.');return;}
  items.push({name,cat,val,ret,stop,buy});
  ['inp-name','inp-val','inp-ret','inp-stop','inp-buy'].forEach(id=>document.getElementById(id).value='');
  render();
}

function del(i) {
  if (!confirm(`"${items[i].name}"을(를) 삭제할까요?`)) return;
  items.splice(i,1); render();
}

// ── 리밸런싱 ─────────────────────────────────────────────────────
function renderRebal() {
  const total = items.reduce((s,i)=>s+i.val,0);
  const cats  = {}; items.forEach(it=>{cats[it.cat]=(cats[it.cat]||0)+it.val;});

  document.getElementById('target-form').innerHTML = CATS.map(cat=>`
    <div class="field">
      <label>${cat}</label>
      <input type="number" id="tgt-${cat}" min="0" max="100" step="1" value="${targets[cat]||0}" oninput="updateTargetSum()"/>
    </div>`).join('');
  updateTargetSum();

  document.getElementById('rebal-tbl').innerHTML = CATS.map(cat=>{
    const cur=total>0?(cats[cat]||0)/total*100:0, tgt=targets[cat]||0;
    const diff=cur-tgt, adj=diff/100*total;
    if (!tgt&&!cur) return '';
    const cls=Math.abs(diff)>=5?(diff>0?'down':'up'):'';
    const c=CAT_COLORS[cat]||'#888';
    return `<tr>
      <td><span style="width:8px;height:8px;border-radius:50%;background:${c};display:inline-block;vertical-align:middle;margin-right:6px"></span>${cat}</td>
      <td>${cur.toFixed(1)}%</td>
      <td>${tgt}%</td>
      <td class="${cls}" style="font-weight:500">${diff>0?'+':''}${diff.toFixed(1)}%p</td>
      <td class="${cls}">${adj>0?'▼ 매도':adj<0?'▲ 매수':'균형'} ₩${fmt(Math.abs(adj))}</td>
    </tr>`;
  }).join('');
}

function updateTargetSum() {
  const sum = CATS.reduce((s,cat)=>s+(parseFloat(document.getElementById('tgt-'+cat)?.value)||0),0);
  const msg = document.getElementById('target-sum-msg');
  msg.textContent = `합계: ${sum.toFixed(0)}% ${sum===100?'✓':sum>100?'(100% 초과)':'(100% 미만)'}`;
  msg.style.color = sum===100?'var(--green)':'var(--amber)';
}

function saveTargets() {
  const sum = CATS.reduce((s,cat)=>s+(parseFloat(document.getElementById('tgt-'+cat)?.value)||0),0);
  if (Math.abs(sum-100)>0.5){alert('합계가 100%가 되도록 설정해주세요.');return;}
  CATS.forEach(cat=>{targets[cat]=parseFloat(document.getElementById('tgt-'+cat).value)||0;});
  save('pf_targets',targets);
  render();
  alert('목표 비중이 저장되었습니다.');
}

// ── 알림 ─────────────────────────────────────────────────────────
function renderAlerts() {
  const alerts = getAlerts();
  const wrap = document.getElementById('alerts-wrap');
  const none = document.getElementById('no-alerts');
  if (!alerts.length){wrap.innerHTML='';none.style.display='block';return;}
  none.style.display='none';
  wrap.innerHTML='<div class="alerts">'+alerts.map(a=>{
    if(a.type==='rebal') return `<div class="alert rebal"><span class="alert-icon">⚖️</span><div class="alert-body"><strong>${a.cat} 리밸런싱 필요</strong>현재 ${a.cur.toFixed(1)}% → 목표 ${a.tgt}% (${a.diff>0?'+':''}${a.diff.toFixed(1)}%p 차이)</div></div>`;
    if(a.type==='stop')  return `<div class="alert stop"><span class="alert-icon">🚨</span><div class="alert-body"><strong>${a.name} 손절선 도달</strong>현재 수익률 ${fmtPct(a.ret)} — 설정 손절선 ${a.line}%</div></div>`;
    if(a.type==='buy')   return `<div class="alert buy"><span class="alert-icon">📉</span><div class="alert-body"><strong>${a.name} 추매 타이밍</strong>현재 수익률 ${fmtPct(a.ret)} — 설정 추매선 ${a.line}%</div></div>`;
  }).join('')+'</div>';
}

// ── 히스토리 ─────────────────────────────────────────────────────
function saveSnapshot() {
  const total  = items.reduce((s,i)=>s+i.val,0);
  const gain   = items.reduce((s,i)=>s+i.val*i.ret/100,0);
  const retPct = (total-gain)>0?gain/(total-gain)*100:0;
  const memo   = document.getElementById('snap-memo').value.trim();
  const date   = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'});
  snapshots.push({date,total,retPct,memo});
  snapshots.sort((a,b)=>a.date.localeCompare(b.date));
  save('pf_snaps',snapshots);
  document.getElementById('snap-memo').value='';
  renderHistory();
}

function delSnap(i){
  if(!confirm('스냅샷을 삭제할까요?'))return;
  snapshots.splice(i,1);save('pf_snaps',snapshots);renderHistory();
}

function renderHistory() {
  const tbl  = document.getElementById('snap-tbl');
  const none = document.getElementById('no-snaps');
  none.style.display = snapshots.length?'none':'block';
  tbl.innerHTML = [...snapshots].reverse().map((s,ri)=>{
    const i=snapshots.length-1-ri;
    return `<tr>
      <td>${s.date}</td>
      <td>₩${fmt(s.total)}</td>
      <td><span class="badge ${s.retPct>=0?'up':'dn'}">${fmtPct(s.retPct)}</span></td>
      <td style="color:var(--text2)">${s.memo||'—'}</td>
      <td><button class="btn-del" onclick="delSnap(${i})">✕</button></td>
    </tr>`;
  }).join('');

  if(histChart){histChart.destroy();histChart=null;}
  if(!snapshots.length) return;
  const dark = isDark();
  const gc   = dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.06)';
  const tc   = dark?'#9a9a96':'#6b6b67';
  histChart = new Chart(document.getElementById('hist-chart').getContext('2d'),{
    type:'line',
    data:{
      labels: snapshots.map(s=>s.date),
      datasets:[{
        label:'총자산',
        data: snapshots.map(s=>s.total),
        borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,0.08)',
        borderWidth:2,pointRadius:4,pointBackgroundColor:'#378ADD',fill:true,tension:0.3
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{color:gc},ticks:{color:tc,font:{size:11}}},
        y:{grid:{color:gc},ticks:{color:tc,font:{size:11},callback:v=>'₩'+(v>=1e8?(v/1e8).toFixed(0)+'억':v>=1e4?(v/1e4).toFixed(0)+'만':fmt(v))}}
      }
    }
  });
}

render();
</script>
</body>
</html>
